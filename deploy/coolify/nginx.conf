worker_processes auto;
events { worker_connections 1024; }
http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile        on;
  keepalive_timeout 65;

  upstream app_backend {
    server app:3001;
  }

  server {
    listen 80;
    server_name _;

    # Allow large uploads used by the UI
    client_max_body_size 250M;

    # Serve the frontend and proxy API requests to the app container
    location / {
      proxy_pass http://app_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Header mapping the auth gateway should populate. Adjust names if your gateway uses different headers.
      proxy_set_header X-Auth-User-Id $http_x_auth_user_id;
      proxy_set_header X-Auth-Tenant-Id $http_x_auth_tenant_id;
      proxy_set_header X-Auth-Client-Id $http_x_auth_client_id;

      # Preserve any upstream X-Robots-Tag if set; otherwise app sets its own
      proxy_pass_header X-Robots-Tag;

      proxy_read_timeout 120s;
      proxy_connect_timeout 10s;
      proxy_send_timeout 120s;
    }

    # Optionally serve robots.txt directly from the repo (disable crawling)
    location = /robots.txt {
      add_header Content-Type text/plain;
      return 200 "User-agent: *\nDisallow: /\n";
    }
  }
}
