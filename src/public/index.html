<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner Backup Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1a1a;
  --bg-card: #1f1f1f;
  --bg-hover: #242424;
  --text: #d1d5db;
  --text-heading: #f3f4f6;
  --text-muted: #6b7280;
  --text-soft: #9ca3af;
  --text-name: #e5e7eb;
  --accent: #fdcd02;
  --accent-hover: #f5c200;
  --border: #2a2a2a;
  --border-hover: #374151;
  --border-dashed: #374151;
  --btn-secondary-bg: #2a2a2a;
  --btn-secondary-text: #d1d5db;
  --btn-secondary-hover: #323232;
  --badge-zip-bg: #1e3a5f;
  --badge-zip-text: #93c5fd;
  --badge-riv-bg: #3b1f4e;
  --badge-riv-text: #c4b5fd;
  --progress-bg: #2a2a2a;
  --errors-bg: #2d1515;
  --errors-border: #4a1a1a;
  --state-queued: #6b7280;
  --state-processing: #fbbf24;
  --state-done: #10b981;
  --state-failed: #ef4444;
  --state-skip-bg: #1f2d1f;
  --state-skip-text: #6b8e6b;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #f5f5f0;
    --bg-card: #ffffff;
    --bg-hover: #fafaf5;
    --text: #4b5563;
    --text-heading: #1f2937;
    --text-muted: #9ca3af;
    --text-soft: #6b7280;
    --text-name: #1f2937;
    --accent: #fdcd02;
    --accent-hover: #e8be02;
    --border: #e5e7eb;
    --border-hover: #d1d5db;
    --border-dashed: #d1d5db;
    --btn-secondary-bg: #e5e7eb;
    --btn-secondary-text: #374151;
    --btn-secondary-hover: #d1d5db;
    --badge-zip-bg: #dbeafe;
    --badge-zip-text: #1e40af;
    --badge-riv-bg: #ede9fe;
    --badge-riv-text: #5b21b6;
    --progress-bg: #e5e7eb;
    --errors-bg: #fef2f2;
    --errors-border: #fecaca;
    --state-queued: #9ca3af;
    --state-processing: #d97706;
    --state-done: #059669;
    --state-failed: #dc2626;
    --state-skip-bg: #e8f5e8;
    --state-skip-text: #4a7a4a;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  -webkit-font-smoothing: antialiased;
}
.container {
  width: 580px; max-width: 94vw; padding: 2rem 0;
}

/* Header */
.logo { margin-bottom: 2rem; }
.logo h1 {
  font-size: 1.75rem; font-weight: 700; color: var(--text-heading);
  letter-spacing: -0.02em; margin-bottom: 0;
}
.logo h1 span { color: var(--accent); }
.logo p {
  font-size: 0.875rem; color: var(--text-muted); margin-top: 0.25rem;
}

/* Drop zone */
.drop-zone {
  border: 2px dashed var(--border-dashed); border-radius: 12px;
  padding: 4rem 2rem; text-align: center; cursor: pointer;
  transition: border-color .2s, background .2s;
  background: var(--bg-card);
}
.drop-zone:hover { border-color: var(--accent); background: var(--bg-hover); }
.drop-zone.dragover { border-color: var(--accent); background: var(--bg-hover); }
.drop-zone:focus-visible {
  outline: 2px solid var(--accent); outline-offset: 2px;
}
.drop-zone-icon { margin-bottom: 0.75rem; }
.drop-zone-icon svg { width: 48px; height: 48px; stroke: var(--text-muted); transition: stroke .2s; display: block; margin: 0 auto; }
.drop-zone:hover .drop-zone-icon svg,
.drop-zone.dragover .drop-zone-icon svg { stroke: var(--accent); }
.drop-zone-text { font-size: 0.9375rem; color: var(--text-soft); }
.drop-zone-text strong { color: var(--text); font-weight: 600; }
.drop-zone-hint {
  font-size: 0.8125rem; color: var(--text-muted); margin-top: 0.5rem;
}

/* File list */
.file-list { margin-top: 1.25rem; display: none; }
.file-list.visible { display: block; }
.file-item {
  display: flex; align-items: flex-start; gap: 0.75rem;
  padding: 0.625rem 0.875rem; background: var(--bg-card); border-radius: 10px;
  margin-bottom: 0.375rem; border: 1px solid var(--border);
  transition: border-color .15s;
}
.file-item:hover { border-color: var(--border-hover); }
.file-item-col { flex: 1; min-width: 0; }
.file-item-row { display: flex; align-items: center; gap: 0.5rem; }
.file-type-badge {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 1px 7px; border-radius: 5px;
  font-size: 0.6875rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.03em; line-height: 1.5;
  flex-shrink: 0;
}
.file-type-badge.zip { background: var(--badge-zip-bg); color: var(--badge-zip-text); }
.file-type-badge.riv { background: var(--badge-riv-bg); color: var(--badge-riv-text); }
.file-name {
  font-size: 0.875rem; font-weight: 500; color: var(--text-name);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.file-size { font-size: 0.8125rem; color: var(--text-muted); white-space: nowrap; }

/* State badges */
.state-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 0.6875rem; font-weight: 600; white-space: nowrap;
  padding: 2px 7px; border-radius: 999px; line-height: 1.4;
  flex-shrink: 0;
}
.state-badge.uploaded { background: #374151; color: var(--text-soft); }
.state-badge.queued { background: #374151; color: var(--state-queued); }
.state-badge.processing { background: #3b3410; color: var(--state-processing); }
.state-badge.complete { background: #0c3623; color: var(--state-done); }
.state-badge.failed { background: #3b1515; color: var(--state-failed); }
.state-badge.skipped { background: var(--state-skip-bg); color: var(--state-skip-text); }

@media (prefers-color-scheme: light) {
  .state-badge.uploaded { background: #e5e7eb; color: var(--text-soft); }
  .state-badge.queued { background: #e5e7eb; color: var(--state-queued); }
  .state-badge.processing { background: #fef3c7; color: var(--state-processing); }
  .state-badge.complete { background: #d1fae5; color: var(--state-done); }
  .state-badge.failed { background: #fee2e2; color: var(--state-failed); }
  .state-badge.skipped { background: var(--state-skip-bg); color: var(--state-skip-text); }
}

.state-badge .spinner {
  display: inline-block; width: 8px; height: 8px;
  border: 1.5px solid transparent; border-top-color: currentColor;
  border-radius: 50%; animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.state-badge .check { font-weight: 700; }
.state-badge .cross { font-weight: 700; }

/* File error */
.file-error {
  font-size: 0.75rem; color: var(--state-failed); margin-top: 0.375rem;
  line-height: 1.4; word-break: break-word;
}
.file-error-code {
  display: inline-block; font-family: monospace; font-size: 0.6875rem;
  background: rgba(239,68,68,0.1); padding: 0 4px; border-radius: 3px;
  margin-right: 4px;
}

/* Error summary banner */
.error-summary {
  margin-top: 0.75rem; padding: 0.75rem; border-radius: 10px;
  background: var(--errors-bg); border: 1px solid var(--errors-border);
  font-size: 0.8125rem; color: var(--state-failed); line-height: 1.5;
  display: none;
}
.error-summary.visible { display: block; }
.error-summary strong { font-weight: 600; }

/* Actions bar */
.actions {
  display: flex; gap: 0.625rem; margin-top: 1rem;
}
.actions-col {
  display: flex; flex-direction: column; gap: 0.5rem; width: 100%;
}
.actions-row {
  display: flex; gap: 0.625rem;
}
.btn {
  flex: 1; padding: 0.75rem 1.5rem; border: none; border-radius: 10px;
  font-size: 0.9375rem; font-weight: 600; cursor: pointer;
  transition: all .15s; font-family: inherit;
}
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-primary {
  background: var(--accent); color: #1a1a1a;
}
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
.btn-secondary {
  background: var(--btn-secondary-bg); color: var(--btn-secondary-text);
}
.btn-secondary:hover:not(:disabled) { background: var(--btn-secondary-hover); }
.btn-success {
  background: var(--state-done); color: #fff;
}
.btn-success:hover:not(:disabled) { background: #059669; }
.btn-retry {
  background: var(--state-failed); color: #fff;
}
.btn-retry:hover:not(:disabled) { background: #dc2626; }

/* Progress */
.progress-wrap { margin-top: 1rem; display: none; }
.progress-wrap.visible { display: block; }
.progress-bar {
  height: 4px; background: var(--progress-bg); border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--accent); border-radius: 2px;
  transition: width .3s ease; width: 0;
}
.progress-text {
  font-size: 0.8125rem; color: var(--text-muted); margin-top: 0.5rem;
}

/* Overlay */
.overlay {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,.6); -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
.overlay.visible { display: flex; flex-direction: column; gap: 1.5rem; }
.overlay img { width: 720px; height: 405px; }
.overlay .waiting-text {
  font-size: 0.9375rem; color: #f3f4f6; text-align: center;
  max-width: 400px; line-height: 1.5; min-height: 3em;
}

/* Accessibility */
.sr-only {
  position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0,0,0,0); border: 0;
}
</style>
</head>
<body>
<div class="container" role="main">
  <div class="logo">
    <h1>Banner Backup Generator</h1>
    <p>Drop your creatives &rarr; get optimised JPG backup images</p>
  </div>

  <div class="drop-zone" id="dropZone" role="button" tabindex="0" aria-label="Upload ZIP or RIV files">
    <div class="drop-zone-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
        <polyline points="17 8 12 3 7 8" />
        <line x1="12" y1="3" x2="12" y2="15" />
      </svg>
    </div>
    <div class="drop-zone-text">
      <strong>Choose files</strong> or drag them here
    </div>
    <div class="drop-zone-hint">ZIP or .riv &middot; multiple allowed</div>
  </div>
  <input type="file" id="fileInput" multiple accept=".zip,.riv" hidden aria-hidden="true">

  <div class="file-list" id="fileList" role="list" aria-label="Uploaded files"></div>

  <div class="error-summary" id="errorSummary" role="alert"></div>

  <div class="actions">
    <div class="actions-col">
      <div class="actions-row">
        <button class="btn btn-primary" id="processBtn" disabled>Generate backups</button>
        <button class="btn btn-success" id="downloadBtn" style="display:none">Download ZIP</button>
        <button class="btn btn-retry" id="retryBtn" style="display:none">Retry failed</button>
        <button class="btn btn-secondary" id="resetBtn" style="display:none">Start over</button>
      </div>
    </div>
  </div>

  <div class="progress-wrap" id="progressWrap" role="status" aria-live="polite">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText"></div>
  </div>
</div>

<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-label="Processing files">
  <img src="animation.gif" alt="Processing..." aria-hidden="true">
  <div class="waiting-text" id="waitingText"></div>
</div>

<script>
let sessionId = null;
let sessionFiles = [];    // { id, name, type, state, error }
let polling = false;
let completed = false;

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileList = document.getElementById('fileList');
const processBtn = document.getElementById('processBtn');
const downloadBtn = document.getElementById('downloadBtn');
const retryBtn = document.getElementById('retryBtn');
const resetBtn = document.getElementById('resetBtn');
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const overlay = document.getElementById('overlay');
const waitingText = document.getElementById('waitingText');
const errorSummary = document.getElementById('errorSummary');

const waitingMessages = [
  "Reticulating splines...",
  "Herding pixels...",
  "Teaching the canvas to hold still...",
  "Warming up the JPEG engine...",
  "Counting to infinity (almost there)...",
  "Your banner is doing its morning stretches...",
  "Applying digital lipstick...",
  "Convincing the browser to cooperate...",
  "Dealing with Adobe's ghosts...",
  "You look nice today, by the way.",
  "That's a quality banner you've got there.",
  "I'd swipe right on this banner.",
  "This banner is more optimized than my life choices.",
  "Your taste in creatives is impeccable.",
  "Sharpening the pixels...",
  "Making it pop (professionally)...",
  "Feeding the color palette...",
  "This is the hardest-working GIF on the internet.",
  "If this were a movie, we'd be at the montage part.",
  "Brewing digital coffee...",
  "Resisting the urge to loop forever...",
  "We've traced the problem to a faulty TCP packet. Just kidding.",
  "Compressing with the power of a thousand suns...",
  "Still faster than waiting for a designer to name their layers.",
  "Almost done! (No, really, this time for sure.)",
  "Putting the 'pro' in 'processing'...",
  "The animators are working overtime.",
  "Tickling the canvas pixels...",
  "Your backup is being gently lowered into JPEG format.",
  "Go make some tea. Or coffee. Or a daiquiri. I don't judge.",
];

let waitingInterval = null;

// ---------------------------------------------------------------------------
// Drop / file picker
// ---------------------------------------------------------------------------

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); } });
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', () => handleFiles(fileInput.files));

// ---------------------------------------------------------------------------
// Error code → user-friendly message map
// ---------------------------------------------------------------------------

const ERROR_HELP = {
  NO_FILES: 'Select at least one .zip or .riv file.',
  INVALID_FILE_TYPE: 'Only .zip (banner HTML creatives) and .riv (Rive animation) files are accepted.',
  UNSAFE_FILENAME: 'The file name contains invalid characters. Rename it and try again.',
  FILE_TOO_LARGE: 'The file exceeds the 200 MB size limit. Compress or split it.',
  RATE_LIMITED: 'Too many requests. Wait a moment and try again.',
  NOTHING_TO_RETRY: 'There are no failed files to retry.',
  INVALID_STATE: 'The job cannot be retried in its current state.',
  BAD_REQUEST: 'The request was malformed. Try uploading again.',
  UPLOAD_ERROR: 'The upload could not be processed. Try again.',
  ALREADY_PROCESSING: 'This job is already being processed. Wait for it to complete.',
};

const ERROR_LABELS = {
  NO_FILES: 'No files',
  INVALID_FILE_TYPE: 'Unsupported type',
  UNSAFE_FILENAME: 'Unsafe name',
  FILE_TOO_LARGE: 'File too large',
  RATE_LIMITED: 'Rate limited',
  NOTHING_TO_RETRY: 'Nothing to retry',
  MALFORMED_CREATIVE: 'Malformed creative',
  MISSING_HTML: 'Missing HTML',
  INVALID_DIMENSIONS: 'Invalid dimensions',
  CREATIVE_LOAD_FAILURE: 'Load failure',
  BLANK_CANVAS: 'Blank canvas',
  EXTRACTION_ERROR: 'Extraction error',
  UNKNOWN: 'Error',
};

function friendlyErrorLabel(code) {
  return ERROR_LABELS[code] || ERROR_LABELS.UNKNOWN;
}

// ---------------------------------------------------------------------------
// File handling
// ---------------------------------------------------------------------------

function handleFiles(files) {
  const newFiles = Array.from(files).filter(f => /\.(zip|riv)$/i.test(f.name));
  if (newFiles.length === 0) {
    showToast('Only .zip and .riv files are supported.', 'warn');
    return;
  }

  if (completed) {
    resetUI();
  }

  const existingNames = new Set(sessionFiles.map(f => f.name));
  const trulyNew = newFiles.filter(f => !existingNames.has(f.name));
  if (trulyNew.length === 0) return;

  const form = new FormData();
  trulyNew.forEach(f => form.append('files', f));

  processBtn.disabled = true;
  errorSummary.classList.remove('visible');

  fetch('/api/v1/jobs', { method: 'POST', body: form })
    .then(r => {
      if (!r.ok) return r.json().then(err => { throw new Error(err.error || 'Upload failed'); });
      return r.json();
    })
    .then(data => {
      sessionId = data.jobId;
      const mapped = data.files.map(f => ({
        id: f.fileId,
        name: f.fileName,
        type: f.fileType,
        state: f.state,
        error: f.error || null
      }));
      sessionFiles = [...sessionFiles, ...mapped];
      renderFileList();
      processBtn.disabled = false;
    })
    .catch(err => {
      showToast(err.message, 'error');
    });
}

// ---------------------------------------------------------------------------
// Rendering
// ---------------------------------------------------------------------------

function renderFileList() {
  fileList.classList.add('visible');
  fileList.innerHTML = '';
  sessionFiles.forEach(f => {
    const ext = f.type;
    const state = f.state || 'uploaded';
    const div = document.createElement('div');
    div.className = 'file-item';
    div.dataset.fileId = f.id;
    div.setAttribute('role', 'listitem');

    div.innerHTML = `
      <div class="file-item-col">
        <div class="file-item-row">
          <span class="file-type-badge ${ext}">${ext}</span>
          <span class="file-name">${escapeHtml(f.name)}</span>
        </div>
        <div class="file-error" id="err-${escapeHtml(f.id)}"></div>
      </div>
      <span class="state-badge ${state}" id="badge-${escapeHtml(f.id)}">${stateBadgeContent(state)}</span>
    `;
    fileList.appendChild(div);

    if (state === 'failed' && f.error) {
      showFileError(f.id, f.error);
    }
  });
}

function stateBadgeContent(state) {
  switch (state) {
    case 'uploaded': return 'uploaded';
    case 'queued': return 'queued';
    case 'processing': return '<span class="spinner"></span> processing';
    case 'complete': return '<span class="check">&#10003;</span> done';
    case 'failed': return '<span class="cross">&#10007;</span> failed';
    case 'skipped': return 'skipped';
    default: return state;
  }
}

function updateFileState(fileId, newState, errorMsg) {
  const f = sessionFiles.find(x => x.id === fileId);
  if (!f) return;
  f.state = newState;
  if (errorMsg) f.error = errorMsg;

  const badge = document.getElementById('badge-' + CSS.escape(fileId));
  if (badge) badge.innerHTML = stateBadgeContent(newState);
  badge.className = 'state-badge ' + newState;

  if (newState === 'failed' && errorMsg) {
    showFileError(fileId, errorMsg);
  } else if (newState !== 'failed') {
    clearFileError(fileId);
  }
}

function showFileError(fileId, msg) {
  const el = document.getElementById('err-' + CSS.escape(fileId));
  if (!el) return;
  el.textContent = msg;
}

function clearFileError(fileId) {
  const el = document.getElementById('err-' + CSS.escape(fileId));
  if (el) el.textContent = '';
}

// ---------------------------------------------------------------------------
// Error summary banner
// ---------------------------------------------------------------------------

function showErrorSummary(message) {
  errorSummary.textContent = message;
  errorSummary.classList.add('visible');
}

function hideErrorSummary() {
  errorSummary.textContent = '';
  errorSummary.classList.remove('visible');
}

// ---------------------------------------------------------------------------
// Toast notification (inline, non-blocking)
// ---------------------------------------------------------------------------

function showToast(message, type) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.setAttribute('role', 'alert');
  toast.textContent = message;
  Object.assign(toast.style, {
    position: 'fixed', bottom: '24px', left: '50%', transform: 'translateX(-50%)',
    background: type === 'error' ? '#3b1515' : '#1f2d1f',
    color: type === 'error' ? '#ef4444' : '#10b981',
    padding: '12px 20px', borderRadius: '10px', fontSize: '0.875rem',
    fontWeight: '500', zIndex: '2000', border: '1px solid ' + (type === 'error' ? '#4a1a1a' : '#1f3a1f'),
    boxShadow: '0 4px 12px rgba(0,0,0,0.3)', maxWidth: '90vw',
    transition: 'opacity .3s'
  });
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 4000);
}

// ---------------------------------------------------------------------------
// Polling / status
// ---------------------------------------------------------------------------

function updateAllFromServer(files) {
  files.forEach(sf => {
    const local = sessionFiles.find(x => x.id === sf.id);
    if (local) {
      local.state = sf.state;
      if (sf.error) local.error = sf.error;
    }
  });
  renderFileList();
}

// ---------------------------------------------------------------------------
// Process / Retry / Download / Reset
// ---------------------------------------------------------------------------

processBtn.addEventListener('click', () => startProcessing());

async function startProcessing() {
  if (!sessionId) return;

  processBtn.disabled = true;
  downloadBtn.style.display = 'none';
  retryBtn.style.display = 'none';
  resetBtn.style.display = 'none';
  hideErrorSummary();
  overlay.classList.add('visible');
  startWaitingText();
  progressWrap.classList.add('visible');
  progressFill.style.width = '0%';
  progressText.textContent = 'Starting...';

  sessionFiles.forEach(f => { if (f.state === 'uploaded') f.state = 'queued'; });
  renderFileList();

  const res = await fetch(`/api/v1/jobs/${sessionId}/process`, { method: 'POST' });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: 'Failed to start' }));
    overlay.classList.remove('visible');
    stopWaitingText();
    progressText.textContent = err.error || 'Failed to start processing';
    processBtn.disabled = false;
    return;
  }

  polling = true;
  pollStatus();
}

retryBtn.addEventListener('click', () => startRetry());

async function startRetry() {
  if (!sessionId) return;

  processBtn.disabled = true;
  downloadBtn.style.display = 'none';
  retryBtn.style.display = 'none';
  resetBtn.style.display = 'none';
  hideErrorSummary();
  overlay.classList.add('visible');
  startWaitingText();
  progressWrap.classList.add('visible');
  progressFill.style.width = '0%';
  progressText.textContent = 'Retrying failed files...';

  const res = await fetch(`/api/v1/jobs/${sessionId}/retry`, { method: 'POST' });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: 'Retry failed', code: 'UNKNOWN' }));
    overlay.classList.remove('visible');
    stopWaitingText();
    progressText.textContent = err.error || 'Retry failed';

    // Re-enable appropriate buttons based on previous state
    const hasSuccess = sessionFiles.some(f => f.state === 'complete');
    const hasFailures = sessionFiles.some(f => f.state === 'failed');
    if (hasSuccess) downloadBtn.style.display = 'block';
    if (hasFailures) retryBtn.style.display = 'block';
    resetBtn.style.display = 'block';
    processBtn.disabled = false;
    return;
  }

  polling = true;
  pollStatus();
}

async function pollStatus() {
  while (polling) {
    try {
      const res = await fetch(`/api/v1/jobs/${sessionId}`);
      const data = await res.json();

      if (data.files) {
        data.files.forEach(sf => {
          updateFileState(sf.fileId, sf.state, sf.error);
        });
      }

      const done = data.files ? data.files.filter(f => f.state === 'complete' || f.state === 'failed').length : 0;
      const total = data.progress ? data.progress.total : data.total;
      const pct = total > 0 ? (done / total * 100) : 0;
      progressFill.style.width = Math.min(pct, 100) + '%';

      if (data.status === 'processing') {
        const doneCount = data.files ? data.files.filter(f => f.state === 'complete' || f.state === 'failed').length : 0;
        progressText.textContent = `Processing ${doneCount} of ${total}...`;
      }

      if (data.status === 'complete') {
        completed = true;
        overlay.classList.remove('visible');
        stopWaitingText();
        progressFill.style.width = '100%';

        const successCount = data.files ? data.files.filter(f => f.state === 'complete').length : 0;
        const failCount = data.files ? data.files.filter(f => f.state === 'failed').length : 0;

        if (failCount > 0 && successCount > 0) {
          progressText.textContent = `Partial success — ${successCount} image(s) generated, ${failCount} failed`;
          showErrorSummary(`${failCount} file(s) failed. The download ZIP includes an errors.json with details.`);
        } else if (failCount > 0) {
          progressText.textContent = `All ${failCount} file(s) failed`;
          showErrorSummary('All files failed. Check each file for the specific error.');
        } else {
          progressText.textContent = `Complete — ${successCount} image(s) generated`;
        }

        if (successCount > 0) {
          downloadBtn.style.display = 'block';
          downloadBtn.focus();
        }
        if (failCount > 0 && data.canRetry) {
          retryBtn.style.display = 'block';
        }
        resetBtn.style.display = 'block';
        polling = false;
        return;
      }

      if (data.status === 'error') {
        completed = true;
        overlay.classList.remove('visible');
        stopWaitingText();
        progressText.textContent = 'Processing failed';
        showErrorSummary('An unexpected error occurred during processing.');
        resetBtn.style.display = 'block';
        polling = false;
        return;
      }
    } catch (e) {
      if (polling) {
        progressText.textContent = 'Status check failed, retrying...';
      }
    }

    await new Promise(r => setTimeout(r, 1000));
  }
}

downloadBtn.addEventListener('click', startDownload);

function startDownload() {
  if (!sessionId) return;

  downloadBtn.disabled = true;
  downloadBtn.textContent = 'Downloading...';

  // Use a hidden iframe to trigger download without navigation
  const iframe = document.createElement('iframe');
  iframe.style.display = 'none';
  iframe.src = `/api/v1/jobs/${sessionId}/download`;
  document.body.appendChild(iframe);

  // Poll for the download cookie / track completion via progress
  const checkComplete = setInterval(() => {
    fetch(`/api/v1/jobs/${sessionId}`)
      .then(r => r.json())
      .then(data => {
        if (data.status === 'complete') {
          // Job still exists → download hasn't triggered cleanup yet
        } else {
          // Job was cleaned up (404 or deleted)
          clearInterval(checkComplete);
          setTimeout(() => {
            downloadBtn.textContent = 'Download ZIP';
            downloadBtn.disabled = false;
            resetUI();
          }, 1000);
        }
      })
      .catch(() => {
        // 404 means job was cleaned up
        clearInterval(checkComplete);
        setTimeout(() => {
          downloadBtn.textContent = 'Download ZIP';
          downloadBtn.disabled = false;
          resetUI();
        }, 1000);
      });
  }, 2000);
}

resetBtn.addEventListener('click', resetUI);

function resetUI() {
  sessionId = null;
  sessionFiles = [];
  completed = false;
  fileList.classList.remove('visible');
  fileList.innerHTML = '';
  processBtn.disabled = true;
  downloadBtn.style.display = 'none';
  downloadBtn.disabled = false;
  downloadBtn.textContent = 'Download ZIP';
  retryBtn.style.display = 'none';
  resetBtn.style.display = 'none';
  progressWrap.classList.remove('visible');
  hideErrorSummary();
}

// ---------------------------------------------------------------------------
// Waiting text
// ---------------------------------------------------------------------------

function startWaitingText() {
  let i = 0;
  waitingText.textContent = waitingMessages[i];
  waitingInterval = setInterval(() => {
    i = (i + 1) % waitingMessages.length;
    waitingText.textContent = waitingMessages[i];
  }, 3000);
}

function stopWaitingText() {
  clearInterval(waitingInterval);
  waitingInterval = null;
  waitingText.textContent = '';
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// CSS.escape polyfill for older browsers
if (!CSS.escape) {
  CSS.escape = function(value) {
    return String(value).replace(/([^\w-])/g, '\\$1');
  };
}
</script>
