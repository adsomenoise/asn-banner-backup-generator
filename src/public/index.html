<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Banner Backup Generator</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container" role="main">
  <div class="login-overlay" id="loginOverlay" role="dialog" aria-modal="true" aria-label="Login" tabindex="-1">
    <div class="login-box">
      <h2>Banner Backup Generator</h2>
      <p class="login-desc">Sign in to continue</p>
      <form id="loginForm">
        <label for="loginUsername">Username</label>
        <input type="text" id="loginUsername" name="username" autocomplete="username" required>
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" name="password" autocomplete="current-password" required>
        <button type="submit" class="btn btn-primary" id="loginBtn">Sign in</button>
        <div class="login-error" id="loginError"></div>
      </form>
    </div>
  </div>

  <div class="logo">
    <h1>Banner Backup Generator</h1>
    <p>Drop your creatives &rarr; get optimised JPG backup images</p>
  </div>

  <div class="mode-switch hidden" id="modeSwitch" role="tablist" aria-label="Tool mode">
    <button class="mode-tab active" id="backupModeBtn" role="tab" aria-selected="true" aria-controls="backupPanel">Generate Backups</button>
    <button class="mode-tab" id="validatorModeBtn" role="tab" aria-selected="false" aria-controls="validatorPanel">Validate Ads</button>
  </div>

  <div id="backupPanel" role="tabpanel" aria-labelledby="backupModeBtn">
    <div class="drop-zone" id="dropZone" role="button" tabindex="0" aria-label="Upload ZIP or RIV files">
      <div class="drop-zone-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="17 8 12 3 7 8" />
          <line x1="12" y1="3" x2="12" y2="15" />
        </svg>
      </div>
      <div class="drop-zone-text">
        <strong>Choose files</strong> or drag them here
      </div>
      <div class="drop-zone-hint">ZIP, .riv, or video &middot; multiple allowed</div>
    </div>
    <input type="file" id="fileInput" multiple accept=".zip,.riv,.mp4,.webm,.mov,.avi,.mkv,.flv,.wmv" hidden aria-hidden="true">

    <div class="file-list" id="fileList" role="list" aria-label="Uploaded files"></div>

    <div class="error-summary" id="errorSummary" role="alert"></div>

    <div class="actions">
      <div class="actions-col">
        <div class="actions-row">
          <button class="btn btn-primary" id="processBtn" disabled>Generate backups</button>
          <button class="btn btn-success hidden" id="downloadBtn">Download ZIP</button>
          <button class="btn btn-retry hidden" id="retryBtn">Retry failed</button>
          <button class="btn btn-secondary hidden" id="resetBtn">Start over</button>
        </div>
      </div>
    </div>

    <div class="progress-wrap" id="progressWrap" role="status" aria-live="polite" aria-atomic="true">
      <div class="progress-bar" id="progressBar" role="progressbar" aria-label="Overall processing progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText"></div>
    </div>
  </div>

  <div id="validatorPanel" role="tabpanel" aria-labelledby="validatorModeBtn" class="hidden">
    <div class="validator-toolbar">
      <label for="validatorPreset">Validation preset</label>
      <select id="validatorPreset">
        <option value="generic">Generic QA</option>
        <option value="cm360_dv360">CM360 / DV360</option>
        <option value="google_ads">Google Ads</option>
        <option value="amazon_ads">Amazon Ads</option>
        <option value="xandr">Xandr</option>
        <option value="rive">Rive</option>
        <option value="video">Video</option>
      </select>
    </div>

    <div class="drop-zone" id="validatorDropZone" role="button" tabindex="0" aria-label="Upload files to validate">
      <div class="drop-zone-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="17 8 12 3 7 8" />
          <line x1="12" y1="3" x2="12" y2="15" />
        </svg>
      </div>
      <div class="drop-zone-text">
        <strong>Choose files</strong> to validate
      </div>
      <div class="drop-zone-hint">ZIP, .riv, or video &middot; multiple allowed</div>
    </div>
    <input type="file" id="validatorFileInput" multiple accept=".zip,.riv,.mp4,.webm,.mov,.avi,.mkv,.flv,.wmv" hidden aria-hidden="true">

    <div class="file-list" id="validatorFileList" role="list" aria-label="Files to validate"></div>

    <div class="actions">
      <button class="btn btn-primary" id="validateBtn" disabled>Validate ads</button>
      <button class="btn btn-secondary hidden" id="validatorResetBtn">Start over</button>
    </div>

    <div class="progress-wrap" id="validatorProgressWrap" role="status" aria-live="polite" aria-atomic="true">
      <div class="progress-bar" id="validatorProgressBar" role="progressbar" aria-label="Validation progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><div class="progress-fill" id="validatorProgressFill"></div></div>
      <div class="progress-text" id="validatorStatusText"></div>
    </div>

    <div class="validator-report" id="validatorReport" aria-live="polite"></div>
  </div>
</div>

<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-label="Processing files" tabindex="-1">
  <img src="animation.gif" alt="Processing..." aria-hidden="true">
  <div class="waiting-text" id="waitingText"></div>
  <div class="overlay-progress">
    <div class="progress-bar" id="overlayProgressBar" role="progressbar" aria-label="Processing dialog progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><div class="progress-fill" id="overlayProgressFill"></div></div>
    <div class="progress-text" id="overlayProgressText" aria-live="polite" aria-atomic="true">Starting...</div>
  </div>
  <div class="overlay-files" id="overlayFiles" role="list" aria-label="Processing file statuses"></div>
</div>

<script src="app.js"></script>
</body>
</html>
