<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner Backup Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1a1a;
  --bg-card: #1f1f1f;
  --bg-hover: #242424;
  --text: #d1d5db;
  --text-heading: #f3f4f6;
  --text-muted: #6b7280;
  --text-soft: #9ca3af;
  --text-name: #e5e7eb;
  --accent: #fdcd02;
  --accent-hover: #f5c200;
  --border: #2a2a2a;
  --border-hover: #374151;
  --border-dashed: #374151;
  --btn-secondary-bg: #2a2a2a;
  --btn-secondary-text: #d1d5db;
  --btn-secondary-hover: #323232;
  --badge-zip-bg: #1e3a5f;
  --badge-zip-text: #93c5fd;
  --badge-riv-bg: #3b1f4e;
  --badge-riv-text: #c4b5fd;
  --progress-bg: #2a2a2a;
  --errors-bg: #2d1515;
  --errors-border: #4a1a1a;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #f5f5f0;
    --bg-card: #ffffff;
    --bg-hover: #fafaf5;
    --text: #4b5563;
    --text-heading: #1f2937;
    --text-muted: #9ca3af;
    --text-soft: #6b7280;
    --text-name: #1f2937;
    --accent: #fdcd02;
    --accent-hover: #e8be02;
    --border: #e5e7eb;
    --border-hover: #d1d5db;
    --border-dashed: #d1d5db;
    --btn-secondary-bg: #e5e7eb;
    --btn-secondary-text: #374151;
    --btn-secondary-hover: #d1d5db;
    --badge-zip-bg: #dbeafe;
    --badge-zip-text: #1e40af;
    --badge-riv-bg: #ede9fe;
    --badge-riv-text: #5b21b6;
    --progress-bg: #e5e7eb;
    --errors-bg: #fef2f2;
    --errors-border: #fecaca;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  -webkit-font-smoothing: antialiased;
}
.container {
  width: 580px; max-width: 94vw; padding: 2rem 0;
}

/* Header */
.logo { margin-bottom: 2rem; }
.logo h1 {
  font-size: 1.75rem; font-weight: 700; color: var(--text-heading);
  letter-spacing: -0.02em; margin-bottom: 0;
}
.logo h1 span { color: var(--accent); }
.logo p {
  font-size: 0.875rem; color: var(--text-muted); margin-top: 0.25rem;
}

/* Drop zone */
.drop-zone {
  border: 2px dashed var(--border-dashed); border-radius: 12px;
  padding: 4rem 2rem; text-align: center; cursor: pointer;
  transition: border-color .2s, background .2s;
  background: var(--bg-card);
}
.drop-zone:hover { border-color: var(--accent); background: var(--bg-hover); }
.drop-zone.dragover { border-color: var(--accent); background: var(--bg-hover); }
.drop-zone-icon { margin-bottom: 0.75rem; }
.drop-zone-icon svg { width: 48px; height: 48px; stroke: var(--text-muted); transition: stroke .2s; }
.drop-zone:hover .drop-zone-icon svg,
.drop-zone.dragover .drop-zone-icon svg { stroke: var(--accent); }
.drop-zone-text { font-size: 0.9375rem; color: var(--text-soft); }
.drop-zone-text strong { color: var(--text); font-weight: 600; }
.drop-zone-hint {
  font-size: 0.8125rem; color: var(--text-muted); margin-top: 0.5rem;
}

/* File list */
.file-list { margin-top: 1.25rem; display: none; }
.file-list.visible { display: block; }
.file-item {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.625rem 0.875rem; background: var(--bg-card); border-radius: 10px;
  margin-bottom: 0.375rem; border: 1px solid var(--border);
  transition: border-color .15s;
}
.file-item:hover { border-color: var(--border-hover); }
.file-item-col { flex: 1; min-width: 0; }
.file-item-row { display: flex; align-items: center; gap: 0.5rem; }
.file-type-badge {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 1px 7px; border-radius: 5px;
  font-size: 0.6875rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.03em; line-height: 1.5;
}
.file-type-badge.zip { background: var(--badge-zip-bg); color: var(--badge-zip-text); }
.file-type-badge.riv { background: var(--badge-riv-bg); color: var(--badge-riv-text); }
.file-name {
  font-size: 0.875rem; font-weight: 500; color: var(--text-name);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.file-size { font-size: 0.8125rem; color: var(--text-muted); white-space: nowrap; }
.file-status { font-size: 0.8125rem; font-weight: 500; white-space: nowrap; }
.status-uploaded { color: var(--text-soft); }
.status-processing { color: #fbbf24; }
.status-done { color: #10b981; }
.status-error { color: #f87171; }

/* Actions */
.actions {
  display: flex; gap: 0.625rem; margin-top: 1rem;
}
.btn {
  flex: 1; padding: 0.75rem 1.5rem; border: none; border-radius: 10px;
  font-size: 0.9375rem; font-weight: 600; cursor: pointer;
  transition: all .15s; font-family: inherit;
}
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-primary {
  background: var(--accent); color: #1a1a1a;
}
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
.btn-secondary {
  background: var(--btn-secondary-bg); color: var(--btn-secondary-text);
}
.btn-secondary:hover:not(:disabled) { background: var(--btn-secondary-hover); }
.btn-success {
  background: #10b981; color: #fff;
}
.btn-success:hover:not(:disabled) { background: #059669; }

/* Progress */
.progress-wrap { margin-top: 1rem; display: none; }
.progress-wrap.visible { display: block; }
.progress-bar {
  height: 4px; background: var(--progress-bg); border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--accent); border-radius: 2px;
  transition: width .3s ease; width: 0;
}
.progress-text {
  font-size: 0.8125rem; color: var(--text-muted); margin-top: 0.5rem;
}

/* Errors */
.errors-box {
  margin-top: 0.75rem; padding: 0.75rem 0.875rem;
  background: var(--errors-bg); border: 1px solid var(--errors-border); border-radius: 10px;
  font-size: 0.8125rem; display: none;
}
.errors-box.visible { display: block; }
.errors-box h3 { color: #f87171; font-size: 0.8125rem; font-weight: 600; margin-bottom: 0.375rem; }
.errors-box li { color: #f87171; margin-left: 1rem; margin-bottom: 0.125rem; }

/* Overlay */
.overlay {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
.overlay.visible { display: flex; flex-direction: column; gap: 1.5rem; }
.overlay img { width: 720px; height: 405px; }
.overlay .waiting-text {
  font-size: 0.9375rem; color: #f3f4f6; text-align: center;
  max-width: 400px; line-height: 1.5; min-height: 3em;
}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1><span>B</span>anner Backup Generator</h1>
    <p>Drop your creatives &rarr; get optimised JPG backup images</p>
  </div>

  <div class="drop-zone" id="dropZone">
    <div class="drop-zone-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
        <polyline points="17 8 12 3 7 8" />
        <line x1="12" y1="3" x2="12" y2="15" />
      </svg>
    </div>
    <div class="drop-zone-text">
      <strong>Choose files</strong> or drag them here
    </div>
    <div class="drop-zone-hint">ZIP or .riv &middot; multiple allowed</div>
  </div>
  <input type="file" id="fileInput" multiple accept=".zip,.riv" hidden>

  <div class="file-list" id="fileList"></div>

  <div class="actions">
    <button class="btn btn-primary" id="processBtn" disabled>Generate backups</button>
    <button class="btn btn-success" id="downloadBtn" style="display:none">Download ZIP</button>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText"></div>
  </div>

  <div class="errors-box" id="errorsBox"><h3>Errors</h3><ul id="errorsList"></ul></div>
</div>

<div class="overlay" id="overlay">
  <img src="animation.gif" alt="Processing...">
  <div class="waiting-text" id="waitingText"></div>
</div>

<script>
let sessionId = null;
let uploadedFiles = [];
let polling = false;
let completed = false;

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileList = document.getElementById('fileList');
const processBtn = document.getElementById('processBtn');
const downloadBtn = document.getElementById('downloadBtn');
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const errorsBox = document.getElementById('errorsBox');
const errorsList = document.getElementById('errorsList');
const overlay = document.getElementById('overlay');
const waitingText = document.getElementById('waitingText');

const waitingMessages = [
  "Reticulating splines...",
  "Herding pixels...",
  "Teaching the canvas to hold still...",
  "Warming up the JPEG engine...",
  "Counting to infinity (almost there)...",
  "Your banner is doing its morning stretches...",
  "Applying digital lipstick...",
  "Convincing the browser to cooperate...",
  "Dealing with Adobe's ghosts...",
  "You look nice today, by the way.",
  "That's a quality banner you've got there.",
  "I'd swipe right on this banner.",
  "This banner is more optimized than my life choices.",
  "Your taste in creatives is impeccable.",
  "Sharpening the pixels...",
  "Making it pop (professionally)...",
  "Feeding the color palette...",
  "This is the hardest-working GIF on the internet.",
  "If this were a movie, we'd be at the montage part.",
  "Brewing digital coffee...",
  "Resisting the urge to loop forever...",
  "We've traced the problem to a faulty TCP packet. Just kidding.",
  "Compressing with the power of a thousand suns...",
  "Still faster than waiting for a designer to name their layers.",
  "Almost done! (No, really, this time for sure.)",
  "Putting the 'pro' in 'processing'...",
  "The animators are working overtime.",
  "Tickling the canvas pixels...",
  "Your backup is being gently lowered into JPEG format.",
  "Go make some tea. Or coffee. Or a daiquiri. I don't judge.",
];

let waitingInterval = null;

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', () => handleFiles(fileInput.files));

function handleFiles(files) {
  const newFiles = Array.from(files).filter(f => /\.(zip|riv)$/i.test(f.name));
  if (newFiles.length === 0) return alert('Please select .zip or .riv files only');

  // If a previous batch completed, start fresh
  if (completed) {
    resetUI();
    completed = false;
  }

  // Deduplicate by name — keep existing, only add new names
  const existingNames = new Set(uploadedFiles.map(f => f.name));
  const trulyNew = newFiles.filter(f => !existingNames.has(f.name));
  if (trulyNew.length === 0) return;

  uploadedFiles = [...uploadedFiles, ...trulyNew];

  const form = new FormData();
  uploadedFiles.forEach(f => form.append('zips', f));

  addFilesToUI(trulyNew, 'uploading');
  processBtn.disabled = true;

  fetch('/api/upload', { method: 'POST', body: form })
    .then(r => r.json())
    .then(data => {
      sessionId = data.sessionId;
      markFileStatuses('uploaded');
      processBtn.disabled = false;
    })
    .catch(err => {
      markFileStatuses('error');
      alert('Upload failed: ' + err.message);
    });
}

function addFilesToUI(files, status) {
  fileList.classList.add('visible');
  files.forEach(f => {
    const ext = f.name.match(/\.(\w+)$/i)?.[1]?.toLowerCase() || '';
    const div = document.createElement('div');
    div.className = 'file-item';
    div.dataset.name = f.name;
    div.innerHTML = `
      <div class="file-item-col">
        <div class="file-item-row">
          <span class="file-type-badge ${ext}">${ext}</span>
          <span class="file-name">${f.name}</span>
        </div>
      </div>
      <span class="file-size">${(f.size / 1024).toFixed(0)} KB</span>
      <span class="file-status status-${status}">${status}</span>
    `;
    fileList.appendChild(div);
  });
}

function markFileStatuses(status) {
  fileList.querySelectorAll('.file-item').forEach(el => {
    const span = el.querySelector('.file-status');
    span.className = 'file-status status-' + status;
    span.textContent = status;
  });
}

processBtn.addEventListener('click', async () => {
  if (!sessionId) return;

  processBtn.disabled = true;
  downloadBtn.style.display = 'none';
  errorsBox.classList.remove('visible');
  errorsList.innerHTML = '';
  overlay.classList.add('visible');
  startWaitingText();
  progressWrap.classList.add('visible');
  progressFill.style.width = '0%';
  progressText.textContent = 'Starting...';

  markFileStatuses('processing');

  const res = await fetch(`/api/process/${sessionId}`, { method: 'POST' });
  if (!res.ok) {
    overlay.classList.remove('visible');
    stopWaitingText();
    progressText.textContent = 'Failed to start processing';
    return;
  }

  polling = true;
  pollStatus();
});

async function pollStatus() {
  while (polling) {
    try {
      const res = await fetch(`/api/status/${sessionId}`);
      const data = await res.json();

      const pct = data.total > 0 ? (data.current / data.total * 100) : 0;
      progressFill.style.width = Math.min(pct, 99) + '%';
      progressText.textContent = data.status === 'processing'
        ? `Processing ${data.current} of ${data.total}...`
        : data.status;

      if (data.errors && data.errors.length > 0) {
        errorsBox.classList.add('visible');
        errorsList.innerHTML = data.errors.map(e => `<li>${escapeHtml(e.file || e.zip)}: ${escapeHtml(e.error)}</li>`).join('');
      }

      if (data.status === 'complete') {
        completed = true;
        overlay.classList.remove('visible');
        stopWaitingText();
        progressFill.style.width = '100%';
        progressText.textContent = `Complete — ${data.results} image(s) generated`;
        downloadBtn.style.display = 'block';
        markFileStatuses('done');
        polling = false;
        return;
      }

      if (data.status === 'error') {
        completed = true;
        overlay.classList.remove('visible');
        stopWaitingText();
        progressText.textContent = 'Processing failed';
        polling = false;
        return;
      }
    } catch (e) {
      if (polling) {
        progressText.textContent = 'Status check failed, retrying...';
      }
    }

    await new Promise(r => setTimeout(r, 1000));
  }
}

downloadBtn.addEventListener('click', () => {
  if (!sessionId) return;
  window.location.href = `/api/download/${sessionId}`;
  downloadBtn.disabled = true;
  downloadBtn.textContent = 'Downloading...';
  setTimeout(() => {
    downloadBtn.textContent = 'Download ZIP';
    downloadBtn.disabled = false;
    resetUI();
  }, 3000);
});

function resetUI() {
  sessionId = null;
  uploadedFiles = [];
  completed = false;
  fileList.classList.remove('visible');
  fileList.innerHTML = '';
  processBtn.disabled = true;
  downloadBtn.style.display = 'none';
  progressWrap.classList.remove('visible');
}

function startWaitingText() {
  let i = 0;
  waitingText.textContent = waitingMessages[i];
  waitingInterval = setInterval(() => {
    i = (i + 1) % waitingMessages.length;
    waitingText.textContent = waitingMessages[i];
  }, 3000);
}

function stopWaitingText() {
  clearInterval(waitingInterval);
  waitingInterval = null;
  waitingText.textContent = '';
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
